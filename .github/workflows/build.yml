name: Build and Release StackOrbitAI Bulk Writer Pro

on:
  push:
    tags:
      - 'v*' # Trigger build on version tag pushes (e.g. v1.0.0)

permissions:
  contents: write

env:
  GYP_MSVS_VERSION: 2022

jobs:
  release:
    name: Build & Package Desktop Client
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-2022, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Update NPM to latest (Fixes node-gyp compatibility issues)
        run: npm install -g npm@latest

      - name: Install Python setuptools (Required for SQLite compilation on macOS)
        if: matrix.os == 'macos-latest'
        run: pip3 install setuptools --break-system-packages

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Compile Code Assets (build React & main processes)
        run: npm run build

      - name: Package App and Publish Release Artifacts
        env:
          # GITHUB_TOKEN has write access to the same repo for releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --publish always
