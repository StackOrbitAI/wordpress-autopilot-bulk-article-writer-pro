name: Build and Release StackOrbitAI Bulk Writer Pro

on:
  push:
    tags:
      - 'v*' # Trigger build on version tag pushes (e.g. v1.0.0)

permissions:
  contents: write

env:
  GYP_MSVS_VERSION: 2022

jobs:
  release:
    name: Build & Package Desktop Client
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    strategy:
      matrix:
        include:
          - os: windows-2022
            container: null
          - os: macos-latest
            container: null
          - os: ubuntu-latest
            container: node:20-bullseye

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        if: matrix.container == null
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Update NPM to latest (Fixes node-gyp compatibility issues)
        if: matrix.container == null
        run: npm install -g npm@latest

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libgtk-3-0 \
            libnss3 \
            libasound2 \
            libxss1 \
            libxtst6 \
            libsecret-1-dev \
            libglib2.0-dev \
            fakeroot \
            dpkg \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Install Python setuptools (Required for SQLite compilation on macOS)
        if: matrix.os == 'macos-latest'
        run: pip3 install setuptools --break-system-packages

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Compile Code Assets (build React & main processes)
        run: npm run build

      - name: Package App and Publish Release Artifacts
        env:
          # GITHUB_TOKEN has write access to the same repo for releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --publish always

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Publish Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} --draft=false -R ${{ github.repository }}
